[datasets.equipment_significant_master]
path_ref = "equipment_significant_master_file"
granularity = "line_station_equipment_reference"
required_columns = [
    "linea",
    "estacion",
    "cod_eq",
    "is_suspect_code",
    "is_significant_equipment",
    "station_join_key",
    "station_display_name",
    "station_abbrev",
    "network_order",
    "lat",
    "lon",
    "zone",
    "station_group",
    "station_reference_label",
    "equipment_observation_status",
]
optional_columns = ["n_validations", "first_seen_date", "last_seen_date", "equipment_family", "significant_min_validations_threshold"]
unique_key = ["linea", "estacion", "cod_eq"]

[datasets.network_changes_history]
path_ref = "network_changes_history_file"
granularity = "daily_change_events"
required_columns = ["change_type", "effective_date", "linea", "estacion", "notes"]
optional_columns = ["cod_eq"]
unique_key = ["effective_date", "linea", "estacion", "cod_eq", "change_type"]
date_columns = ["effective_date"]

[datasets.metro_stations]
path_ref = "metro_stations_file"
granularity = "station_display_reference"
required_columns = [
    "data_station_name",
    "station_display_name",
    "station_abbrev",
    "network_order",
    "linea",
    "lat",
    "lon",
    "zone",
    "station_group",
]
