[project]
name = "metro-demand-models"
python_version = "3.12"

[paths]
data_dir = "../data"
external_data_dir = "../data/external"
raw_data_dir = "../data/raw"
interim_data_dir = "../data/interim"
processed_data_dir = "../data/processed"
validation_data_dir = "../data/validation"
validation_schemas_dir = "../data/validation/schemas"
validation_reports_dir = "../data/validation/reports"
validation_quarantine_dir = "../data/validation/quarantine"
artifacts_dir = "artifacts"
models_dir = "artifacts/models"
reports_dir = "artifacts/reports"
mlruns_dir = "mlruns"
interim_operations_dir = "../data/interim/operations"
processed_operations_dir = "../data/processed/operations"
operations_reports_dir = "../data/validation/reports/operations"
daily_modeling_dir = "artifacts/daily_modeling"
daily_training_data_dir = "artifacts/daily_modeling/training_data"
daily_modeling_predictions_dir = "artifacts/daily_modeling/predictions"
daily_modeling_metrics_dir = "artifacts/daily_modeling/metrics"
daily_modeling_reports_dir = "artifacts/daily_modeling/reports"
daily_modeling_visualizations_dir = "artifacts/daily_modeling/visualizations"
daily_modeling_inference_dir = "artifacts/daily_modeling/inference_smoke"
daily_modeling_models_dir = "artifacts/models/daily_modeling"
processed_validations_file = "../data/processed/validaciones/validaciones_consolidado.parquet"
processed_external_daily_features_file = "../data/processed/external_features/external_daily_features.parquet"
stations_master_file = "../data/external/datos_externos/masters/stations_master.parquet"
lines_master_file = "../data/external/datos_externos/masters/lines_master.parquet"
equipment_master_file = "../data/external/datos_externos/masters/equipment_master.parquet"
equipment_significant_master_file = "../data/external/datos_externos/masters/equipment_significant_master.parquet"
network_changes_history_file = "../data/external/datos_externos/masters/network_changes_history.parquet"
metro_stations_file = "../data/external/datos_externos/config/metro_stations.csv"

[data]
preferred_format = "parquet"
supported_formats = ["parquet", "csv", "xlsx", "xlsm"]
source_patterns = ["*.parquet", "*.csv", "*.xlsx", "*.xlsm"]

[mlflow]
tracking_uri = ""
default_experiment = "demand-baselines"
ui_host = "127.0.0.1"
ui_port = 5000

[logging]
level = "INFO"

[datasets.validations]
path_ref = "processed_validations_file"
granularity = "transaction"
required_columns = [
    "fecha_validacion",
    "linea",
    "estacion",
    "cod_eq",
    "tipo_validacion",
    "tipo_titulo",
    "id_tarjeta",
    "num_tarjeta",
    "dinero_deducido",
    "saldo_restante",
    "viajes_deducidos",
    "fecha_validacion_hora_estimada",
    "fecha_generacion",
    "rango_desde",
    "rango_hasta",
    "dia",
    "archivo_origen",
    "_orden_manifest",
]
optional_columns = ["fecha_validacion_iso", "fecha_generacion_iso", "rango_desde_iso", "rango_hasta_iso", "rango_fechas_raw", "idtarjeta"]
timestamp_columns = ["fecha_validacion", "fecha_generacion", "rango_desde", "rango_hasta"]
date_columns = ["dia"]

[datasets.external_daily_features]
path_ref = "processed_external_daily_features_file"
granularity = "daily"
required_columns = [
    "date",
    "year",
    "month",
    "day",
    "quarter",
    "week_of_year",
