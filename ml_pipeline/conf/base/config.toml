    "events_near_metro_count",
    "events_city_center_count",
    "events_culture_count",
    "events_sports_count",
    "events_congress_count",
    "events_university_count",
    "events_religious_count",
    "events_other_count",
    "events_weighted_impact_sum",
    "max_event_impact_score",
    "has_major_event",
    "has_multiple_major_events",
    "events_geocoded_count",
    "events_unique_venue_count",
    "run_id",
    "year_month",
    "year_week",
]
unique_key = ["date"]
date_columns = ["date"]

[datasets.stations_master]
path_ref = "stations_master_file"
granularity = "line_station_reference"
required_columns = [
    "linea",
    "estacion",
    "station_join_key",
    "station_display_name",
    "station_abbrev",
    "network_order",
    "lat",
    "lon",
    "zone",
    "station_group",
    "is_interchange_candidate",
    "station_reference_label",
]
optional_columns = [
    "n_validations",
    "first_seen_date",
    "last_seen_date",
    "n_unique_equipment",
    "n_unique_equipment_significant",
    "n_validations_significant_equipment",
    "significant_equipment_validation_share",
    "station_observation_status",
    "observed_span_days",
]
unique_key = ["linea", "estacion"]

[datasets.lines_master]
path_ref = "lines_master_file"
granularity = "line_reference"
required_columns = ["linea", "line_reference_path"]
optional_columns = ["n_validations", "n_unique_station_rows", "n_unique_equipment", "first_seen_date", "last_seen_date"]
unique_key = ["linea"]

[datasets.equipment_master]
path_ref = "equipment_master_file"
granularity = "line_station_equipment_reference"
required_columns = [
    "linea",
    "estacion",
    "cod_eq",
    "is_suspect_code",
    "is_significant_equipment",
    "station_join_key",
    "station_display_name",
    "station_abbrev",
    "network_order",
