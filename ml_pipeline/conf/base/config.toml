    "temp_max_c",
    "temp_mean_c",
    "precip_mm",
    "rain_hours",
    "wind_max_kmh",
    "wind_mean_kmh",
    "humidity_mean_pct",
    "pressure_mean_hpa",
    "weather_code",
    "weather_source",
    "weather_summary",
