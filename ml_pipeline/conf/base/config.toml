[modeling.execution]
trip_aggregation_engine = "pyarrow_dataset_scanner"
trip_aggregation_mode = "incremental_batches"
trip_scanner_batch_size = 250000
load_full_validation_rows_to_memory = false

[modeling.service_day]
timezone = "Europe/Madrid"
policy = "natural_calendar_day"
boundary_hour = 0
boundary_minute = 0
description = "En Fase 2A service_date coincide con la fecha natural local de fecha_validacion. No se reasignan viajes filtrados de madrugada al dia operativo anterior."

[modeling.series]
series_grain = "line_station"
series_id_column = "series_id"
natural_key_columns = ["linea", "station_join_key"]
series_id_format = "{station_abbrev} with line suffix only for shared stations, e.g. TOR, GDL2"
series_label_columns = ["linea", "estacion", "station_display_name", "station_reference_label"]
why_station_alone_is_not_stable = "Perchel y Guadalmedina aparecen en ambas lineas, asi que estacion sola no identifica una serie unica."
why_cod_eq_is_not_stable = "cod_eq representa equipos, no series de demanda, y en los maestros hay reutilizacion y codigos sospechosos."

[modeling.future_granular_dataset]
name = "future_station_interval_model_base"
status = "planned"
source_dataset = "validations_filtered_to_trips"
prediction_unit = "series_id + interval_start"
series_id_column = "series_id"
time_key_column = "interval_start"
example_interval = "15min"
description = "Capa futura prevista para modelado por estacion e intervalo temporal, sin cerrar aun la arquitectura final del proyecto."

[modeling.joins.trips_to_external_daily_features]
left_dataset = "station_daily_trips"
right_dataset = "external_daily_features"
left_keys = ["service_date"]
right_keys = ["date"]
join_type = "left"
required = true
right_unique = true
missing_policy = "error"

[modeling.joins.station_daily_to_stations_master]
left_dataset = "station_daily_trips"
right_dataset = "stations_master"
left_keys = ["linea", "estacion"]
right_keys = ["linea", "estacion"]
join_type = "left"
required = true
right_unique = true
missing_policy = "error"

[modeling.joins.station_daily_to_lines_master]
left_dataset = "station_daily_trips"
right_dataset = "lines_master"
left_keys = ["linea"]
right_keys = ["linea"]
join_type = "left"
required = false
right_unique = true
missing_policy = "warn"

[modeling.joins.station_daily_to_network_changes]
left_dataset = "station_daily_trips"
right_dataset = "network_changes_daily"
left_keys = ["service_date", "linea", "estacion"]
right_keys = ["service_date", "linea", "estacion"]
join_type = "left"
required = false
right_unique = true
missing_policy = "fill_zero"

[modeling.joins.station_daily_to_equipment_master]
left_dataset = "station_daily_trips"
right_dataset = "equipment_master"
left_keys = ["linea", "estacion"]
right_keys = ["linea", "estacion"]
join_type = "left"
required = false
right_unique = false
missing_policy = "skip"
pre_aggregation = "station_level_summary_required_before_join"

[operations]
namespace = "operations"
inspection_match_normalization = "lower_ascii_trimmed"
service_day_rollover_threshold = "05:00:00"

[operations.naming]
station_abbrev_corrections = { PBI = "PBL" }

[operations.sources.services_history]
path_ref = "raw_data_dir"
file_glob = "Servicios Hist*.xlsx"
sheet_name = "Resumen_Servicios"
granularity = "daily_network"
required_columns = [
    "servicio",
    "archivo_xml_planificado",
    "archivo_xml_usado",
    "fecha",
    "Inicio Serv Comercial",
    "Fin L1 Serv Comercial",
    "Fin L2 Serv Comercial",
    "Descripcion Servicio",
    "evento",
    "Demanda extraordinaria",
    "Comentarios",
    "Comentarios para ING",
]
